services:
  app:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - path: .env
        required: false
    environment:
      ADDR: ":8080"
      OLLAMA_BASE_URL: "http://ollama:11434/api"
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    profiles: ["ai"]
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped

volumes:
  ollama-data:
