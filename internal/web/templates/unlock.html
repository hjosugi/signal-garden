{{define "unlock"}}
<!doctype html>
<html lang="en">
{{template "head" .}}
<body class="crt">
{{template "nav" .}}
<main class="shell unlock-shell">
  <section class="unlock-card">
    <p class="terminal-line"><span class="prompt">$</span> unlock ./signals</p>
    <h1>Private index</h1>
    <p>The portfolio is public. Collected reading history and source status are protected by a separate token.</p>
    {{if .Error}}<p class="form-error" role="alert">{{.Error}}</p>{{end}}
    <form method="post" action="/unlock?next={{queryEscape .Next}}">
      <label for="token">Inbox token</label>
      <input id="token" name="token" type="password" required autocomplete="current-password" autofocus>
      <button class="primary-button" type="submit">unlock</button>
    </form>
  </section>
</main>
{{template "footer" .}}
</body>
</html>
{{end}}
